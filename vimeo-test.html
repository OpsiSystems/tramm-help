<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vimeo Embed Test</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f1f5f9; }
    .video-wrap {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .video-wrap iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }
    p { max-width: 800px; margin: 1rem auto 0; color: #64748b; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="video-wrap">
    <div style="padding:56.25% 0 0 0;position:relative;">
      <iframe
        src="https://vimeo.com/showcase/12077847/embed2"
        allow="autoplay; fullscreen; picture-in-picture; gyroscope; accelerometer; clipboard-write; encrypted-media; web-share"
        frameborder="0"
        style="position:absolute;top:0;left:0;width:100%;height:100%;">
      </iframe>
    </div>
  </div>
  <p>If the showcase playlist appears above with all 16 videos, the embed is working correctly.</p>
</body>
</html>
